# This is a Databricks asset bundle definition for dab_project.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: dab_project
  uuid: b5d2d46a-0dc1-4f6d-a31f-9e38a201b400

include:
  - resources/*.yml
  - resources/*/*.yml

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use
    default: citibike_dev
  dev_flag:
    description: Flag to indicate if this is a dev environment
    default: true

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      profile: dev
      host: https://adb-7405618011768979.19.azuredatabricks.net
      root_path: /Workspace/Shared/railgun@accelidol2gmail.onmicrosoft.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: 
        default: citibike_dev
      dev_flag:
        default: true
  
  test:
    mode: production
    presets:
      name_prefix: '[mikoto] '
    workspace:
      profile: test
      host: https://adb-7405605697332274.14.azuredatabricks.net
      # We explicitly deploy to /Workspace/Users/railgun@accelidol2gmail.onmicrosoft.com to make sure we only have a single copy.
      root_path: /Workspace/Shared/railgun@accelidol2gmail.onmicrosoft.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: 
        default: citibike_test
      dev_flag:
        default: false
    permissions:
      - user_name: railgun@accelidol2gmail.onmicrosoft.com
        level: CAN_MANAGE
  
  prod:
    mode: production
    workspace:
      profile: prod
      host: https://adb-7405605292374056.16.azuredatabricks.net
      # We explicitly deploy to /Workspace/Users/railgun@accelidol2gmail.onmicrosoft.com to make sure we only have a single copy.
      root_path: /Workspace/Shared/railgun@accelidol2gmail.onmicrosoft.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: 
        default: citibike_prod
      dev_flag:
        default: false
    permissions:
      - user_name: railgun@accelidol2gmail.onmicrosoft.com
        level: CAN_MANAGE
