name: CD Workflow

on:
  push:
    branches:
      - main

jobs:
  cd-deploy-test:
    name: Deploy to TEST
    runs-on: ubuntu-latest
    environment: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Databricks CLI
        run: curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh

      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          pip install setuptools wheel
      
      - name: Configure Databricks
        run: |
          #v Write out the profile (here called "TEST")
          cat <EOF > ~/.databrickscfg
          [test]
          host = https://adb-7405605697332274.14.azuredatabricks.net/
          azure_client_id = ${{ secrets.AZURE_CLIENT_ID }}
          azure_tenant_id = ${{ secrets.AZURE_TENANT_ID }}
          azure_client_secret = ${{ secrets.AZURE_CLIENT_SECRET }}
          EOF

      - name: DEPLOY TO TEST
        run: |
          databricks bundle deploy \
          --target test \
          --profile test

cd-deploy-prod:
  name: Deploy to PROD
  needs: cd-deploy-test
  runs-on: ubuntu-latest
  environment: prod
  steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install Databricks CLI
      run: curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh

    - name: Install Dependencies
      run: |
        # write out the profile (here called "PROD")
        cat <EOF > ~/.databrickscfg
        [prod]
        host = https://adb-7405605292374056.16.azuredatabricks.net/
        azure_client_id = ${{ secrets.AZURE_CLIENT_ID }}
        azure_tenant_id = ${{ secrets.AZURE_TENANT_ID }}
        azure_client_secret = ${{ secrets.AZURE_CLIENT_SECRET }}
        EOF
        
    - name: Deploy to prod
      run: |
        databricks bundle deploy \
        --target prod
        -- profile prod
